name: Instagram Monitor

on:
  schedule:
    # KST 10:30~10:55 (UTC 01:30~01:55), 5분 간격
    - cron: "30,35,40,45,50,55 1 * * *"
    # KST 11:00~11:30 (UTC 02:00~02:30), 5분 간격
    - cron: "0,5,10,15,20,25,30 2 * * *"
  workflow_dispatch: # 수동 실행 버튼

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4o-mini"
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_IDS: ${{ secrets.SLACK_USER_IDS }}
          INSTAGRAM_ACCOUNTS: ${{ secrets.INSTAGRAM_ACCOUNTS }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DYNAMODB_TABLE: ${{ secrets.DYNAMODB_TABLE }}
        run: python run.py
